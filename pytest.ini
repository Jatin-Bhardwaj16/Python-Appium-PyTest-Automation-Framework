[pytest]

python_files = test_*.py
python_functions = test_*

markers =
    smoke: Critical smoke tests
    sanity: Basic functionality validation
    regression: Full regression coverage

    device: Device related tests
    device_info: Device information validation

    notification: Notification panel tests
    open_notifications: Open notification shade
    full_notifications_open: Expand notification panel
    full_notifications_close: Collapse notification panel

    brightness: Brightness adjustment tests
    brightness_slider_value: Verify brightness slider value
    brightness_functionality: Verify brightness adjustment functionality

    installation: App installation validation

    load: App launch and loading tests
    display: Home page display verification

    app_info: Package, activity, version and state checks

    lifecycle: App lifecycle management tests
    restart: App restart tests
    background: Backgrounding app tests

    title: Page title validation
    
    menu: Menu item validation
    navigation: Navigation flow tests

    preferences: App preferences tests
    preference: App preferences tests
    preference_dependencies: Preference dependencies validation 

    views: Views section tests
    expandable_lists: Expandable lists tests
    date_widgets: Date widgets tests
    drag_and_drop: Drag and drop functionality tests


addopts =
    -v
    --html=Reports/html/report.html
    --self-contained-html
    --junitxml=Reports/junit/junit.xml
    --alluredir=Reports/allure-results

log_cli = true
log_cli_level = INFO

log_cli_format = %(asctime)s | %(levelname)s | %(worker)s | %(name)s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

console_output_style = progress